# Copy this file to secrets.toml (same folder) and fill in real values.
# secrets.toml is gitignored - never commit it.

# --- Firebase service account ---
# Firebase Console -> Project Settings -> Service Accounts -> Generate new private key
# Paste each field from the downloaded JSON here.
[firebase]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-project-id.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "your-cert-url"

# --- Simple login for you + trusted users ---
# Add one line per person. Username becomes their Firestore data owner id.
[users]
alex = "changeme123"
# jamie = "anotherpassword"
